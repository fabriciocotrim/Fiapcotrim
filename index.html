<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>FGV 2026/3 — Cronograma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf9f6;--bg-elev:#ffffff;--bg-soft:#f3f1ec;
  --text:#1a1a1a;--text-soft:#4a4a4a;--text-mute:#8a8a8a;
  --border:#e6e3dc;--border-soft:#efece5;
  --accent:#c8102e;--accent-soft:#fce8eb;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --shadow-lg:0 4px 12px rgba(0,0,0,.06),0 12px 32px rgba(0,0,0,.04);
  --phase-fundamento:#5b6ee1;--phase-redacao:#d97706;--phase-analise:#a16207;
  --phase-repertorio:#16a34a;--phase-simulado:#b91c1c;--phase-tecnico:#0d9488;
  --phase-marco:#7c3aed;--phase-descanso:#525252;--phase-prova:#000000;
  --radius-sm:8px;--radius:12px;--radius-lg:16px;
}
[data-theme="dark"] {
  --bg:#0f0f0f;--bg-elev:#1a1a1a;--bg-soft:#232323;
  --text:#f0ede5;--text-soft:#c8c4ba;--text-mute:#8a8680;
  --border:#2a2a2a;--border-soft:#1f1f1f;
  --accent:#ef4f5e;--accent-soft:#2d1518;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.3);
  --phase-fundamento:#7b8eef;--phase-redacao:#f59e0b;--phase-analise:#d4a017;
  --phase-repertorio:#4ade80;--phase-simulado:#f87171;--phase-tecnico:#2dd4bf;
  --phase-marco:#a78bfa;--phase-descanso:#a3a3a3;--phase-prova:#f5f5f5;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'Geist',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);
  line-height:1.5;font-size:15px;min-height:100vh;padding-bottom:env(safe-area-inset-bottom);
  padding-top:env(safe-area-inset-top);transition:background .2s,color .2s}
.container{max-width:720px;margin:0 auto;padding:0 16px 80px}
header{padding:24px 0 12px;border-bottom:1px solid var(--border);margin-bottom:20px}
.brand{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px}
.brand-name{font-family:'Fraunces',serif;font-size:18px;font-weight:500;letter-spacing:-.01em}
.brand-name em{color:var(--accent);font-style:normal;font-weight:600}
.brand-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-mute);letter-spacing:.02em}
.countdown{display:flex;align-items:flex-end;gap:16px;margin-bottom:16px}
.countdown-num{font-family:'Fraunces',serif;font-variation-settings:'opsz' 144;
  font-size:clamp(64px,18vw,96px);font-weight:500;line-height:.85;letter-spacing:-.04em;color:var(--text)}
.countdown-label{font-family:'Geist',sans-serif;font-size:12px;color:var(--text-mute);
  letter-spacing:.08em;text-transform:uppercase;padding-bottom:6px}
.countdown-label strong{display:block;color:var(--text-soft);font-weight:500;text-transform:none;
  letter-spacing:0;font-size:13px;margin-top:2px}
.countdown-label .exam-date{font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:500}
.progress{margin-top:4px}
.progress-meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--text-mute);margin-bottom:6px;letter-spacing:.02em}
.progress-meta strong{color:var(--text);font-weight:500}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:2px}
.today-card{background:var(--bg-elev);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--radius);padding:16px 18px;margin-bottom:24px;box-shadow:var(--shadow)}
.today-card[hidden]{display:none}
.today-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;
  color:var(--accent);text-transform:uppercase;margin-bottom:6px;font-weight:500}
.today-task{font-family:'Fraunces',serif;font-size:19px;font-weight:500;line-height:1.3;
  letter-spacing:-.01em;color:var(--text);margin-bottom:8px}
.today-meta{font-size:12px;color:var(--text-mute);font-family:'JetBrains Mono',monospace}
.filters{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:2px 0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--text-soft);
  padding:7px 14px;border-radius:999px;font-family:'Geist',sans-serif;font-size:13px;
  font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.filter-btn:hover{border-color:var(--text-mute)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.week{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:12px;overflow:hidden;transition:box-shadow .15s}
.week.is-current{border-color:var(--accent);box-shadow:var(--shadow)}
.week-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;
  user-select:none;background:var(--bg-elev);transition:background .15s}
.week-header:hover{background:var(--bg-soft)}
.week-id{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  color:var(--text);width:32px;flex-shrink:0;letter-spacing:-.02em}
.week-info{flex:1;min-width:0}
.week-focus{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:var(--text);
  line-height:1.2;margin-bottom:2px;letter-spacing:-.005em}
.week-period{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-mute);
  letter-spacing:.02em;text-transform:uppercase}
.week-progress{display:flex;align-items:center;gap:8px;flex-shrink:0}
.week-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-mute);font-weight:500}
.week-count.complete{color:var(--phase-repertorio)}
.week-chevron{width:14px;height:14px;color:var(--text-mute);transition:transform .2s;flex-shrink:0}
.week.is-open .week-chevron{transform:rotate(90deg)}
.week-days{display:none;border-top:1px solid var(--border)}
.week.is-open .week-days{display:block}
.day{padding:14px 16px;border-bottom:1px solid var(--border-soft);display:flex;gap:12px;
  align-items:flex-start;transition:background .15s}
.day:last-child{border-bottom:none}
.day.is-today{background:var(--accent-soft);position:relative}
.day.is-today::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.day.is-done .day-task{text-decoration:line-through;color:var(--text-mute)}
.day.is-done .day-date{color:var(--text-mute)}
.check{width:20px;height:20px;border:1.5px solid var(--border);border-radius:6px;flex-shrink:0;
  cursor:pointer;margin-top:2px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:var(--bg-elev)}
.check:hover{border-color:var(--text-mute)}
.check.is-checked{background:var(--text);border-color:var(--text)}
.check.is-checked::after{content:'';width:10px;height:6px;border-left:1.5px solid var(--bg);
  border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px)}
.day-body{flex:1;min-width:0}
.day-meta{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap}
.day-date{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;
  color:var(--text);letter-spacing:.02em}
.phase-chip{font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;color:var(--bg)}
.day-task{font-size:14px;color:var(--text);line-height:1.4;margin-bottom:6px}
.day-expand{background:none;border:none;color:var(--text-mute);font-family:'Geist',sans-serif;
  font-size:12px;padding:4px 0;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.day-expand:hover{color:var(--text-soft)}
.day-expand .arrow{transition:transform .2s}
.day.is-expanded .day-expand .arrow{transform:rotate(90deg)}
.day-detail{display:none;margin-top:8px;padding:12px;background:var(--bg-soft);
  border-radius:var(--radius-sm);font-size:13px;line-height:1.5}
.day.is-expanded .day-detail{display:block}
.detail-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.detail-row:last-child{margin-bottom:0}
.detail-label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;
  letter-spacing:.06em;color:var(--text-mute);flex-shrink:0;width:70px;padding-top:2px;font-weight:500}
.detail-value{flex:1;color:var(--text-soft);font-size:13px}
.detail-value em{color:var(--text);font-style:normal;font-weight:500}
.detail-value a{color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);
  padding-bottom:1px;font-weight:500;transition:border-color .15s,color .15s}
.detail-value a:hover{color:var(--accent);border-bottom-color:var(--accent)}
.detail-value a::after{content:' ↗';font-size:.85em;color:var(--text-mute);letter-spacing:-.05em}
.note-input{width:100%;background:var(--bg-elev);border:1px solid var(--border);border-radius:6px;
  padding:8px 10px;font-family:'Geist',sans-serif;font-size:13px;color:var(--text);
  resize:vertical;min-height:60px;margin-top:4px;transition:border-color .15s}
.note-input:focus{outline:none;border-color:var(--text-mute)}
.note-links{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.note-links:empty{display:none}
.note-links a{font-size:12px;color:var(--text-soft);text-decoration:none;border:1px solid var(--border);
  border-radius:6px;padding:5px 9px;word-break:break-all;background:var(--bg-elev);transition:border-color .15s,color .15s}
.note-links a:hover{color:var(--accent);border-color:var(--accent)}
.note-links a::before{content:'↗ ';color:var(--text-mute);font-size:.9em}
.toolbar{position:fixed;bottom:16px;right:16px;display:flex;gap:8px;z-index:10}
.icon-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-elev);border:1px solid var(--border);
  color:var(--text-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-lg);transition:all .15s}
.icon-btn:hover{color:var(--text);transform:translateY(-1px)}
.icon-btn svg{width:16px;height:16px}
footer{margin-top:32px;padding:16px 0;border-top:1px solid var(--border-soft);
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-mute);
  text-align:center;letter-spacing:.04em}
footer .reset-link{background:none;border:none;color:var(--text-mute);cursor:pointer;
  text-decoration:underline;font-family:inherit;font-size:inherit}
footer .reset-link:hover{color:var(--accent)}
.empty{text-align:center;padding:40px 20px;color:var(--text-mute);
  font-family:'Fraunces',serif;font-size:15px;font-style:italic}
@media(min-width:720px){.container{padding:0 24px 80px}.day-meta{gap:12px}}
@media(max-width:380px){.countdown-num{font-size:56px}.week-id{width:28px;font-size:11px}
  .day{padding:12px;gap:10px}.detail-label{width:60px}}
</style>
</head>

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function linkifyText(text){
  if(!text||text==='—')return escapeHtml(text||'');
  const sorted=Object.keys(SOURCES).sort((a,b)=>b.length-a.length);
  const escaped=sorted.map(s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const re=new RegExp(`(?<![\\w@.-])(${escaped.join('|')})(?![\\w@.-])`,'g');
  const safe=escapeHtml(text);
  return safe.replace(re,m=>{const url=SOURCES[m];return`<a href="${url}" target="_blank" rel="noopener noreferrer">${m}</a>`});
}

// ── STATE ──
let state = {done:{},notes:{},theme:'light'};
let currentFilter = 'all';

function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r);state={...state,...p,done:{...(p.done||{})},notes:{...(p.notes||{})}}}}catch(e){}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}

function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function daysBetween(a,b){const ms=864e5;const da=new Date(a);da.setHours(0,0,0,0);const db=new Date(b);db.setHours(0,0,0,0);return Math.round((db-da)/ms)}
function formatTodayLabel(){const dias=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];const d=new Date();return`${dias[d.getDay()]} · ${d.getDate()}.${meses[d.getMonth()]}`}

function findTodayDay(){const t=todayISO();for(const w of DATA)for(const d of w.days)if(d.iso===t)return{week:w,day:d};for(const w of DATA)for(const d of w.days)if(d.iso>=t)return{week:w,day:d,isFuture:true};return null}
function findCurrentWeek(){const t=todayISO();for(const w of DATA){const m=w.days[w.days.length-1].iso;if(m>=t)return w}return DATA[DATA.length-1]}

function renderCountdown(){const d=daysBetween(new Date(),EXAM_DATE);document.getElementById('countdownNum').textContent=d>=0?d:0;document.getElementById('todayDate').textContent=formatTodayLabel()}

function renderProgress(){let t=0,d=0;DATA.forEach(w=>w.days.forEach(dy=>{t++;if(state.done[dy.id])d++}));const p=t?Math.round(d/t*100):0;document.getElementById('progressDone').textContent=d;document.getElementById('progressTotal').textContent=t;document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%'}

function renderToday(){const card=document.getElementById('todayCard');const f=findTodayDay();if(!f){card.hidden=true;return}card.hidden=false;const isFuture=f.day.iso!==todayISO();document.getElementById('todayDayName').textContent=isFuture?`próxima · ${f.day.day} ${f.day.date}`:`${f.week.week} · ${f.day.day} ${f.day.date}`;document.getElementById('todayTask').textContent=f.day.task;document.getElementById('todayMeta').textContent=`${f.week.week} · ${f.week.focus}`}

function shouldShowDay(d){const t=todayISO();switch(currentFilter){case'pending':return!state.done[d.id];case'done':return!!state.done[d.id];case'upcoming':const diff=daysBetween(t,d.iso);return diff>=0&&diff<=14;default:return true}}

function renderNoteLinks(note){if(!note)return'';const re=/(https?:\/\/[^\s<>"']+)/g;const raw=note.match(re);if(!raw)return'';const urls=[...new Set(raw.map(u=>u.replace(/[.,;:!?)\]]+$/,'')))];return urls.map(u=>{const safe=escapeHtml(u);let label=safe;try{label=new URL(u).hostname.replace(/^www\./,'')}catch(e){}return`<a href="${safe}" target="_blank" rel="noopener noreferrer" title="${safe}">${label}</a>`}).join('')}

function renderDay(d,todayIso){const isDone=!!state.done[d.id];const isToday=d.iso===todayIso;const phase=PHASES[d.phase]||{label:d.phase,color:'var(--text-mute)'};const note=state.notes[d.id]||'';
return`<div class="day ${isDone?'is-done':''} ${isToday?'is-today':''}" data-id="${d.id}">
<div class="check ${isDone?'is-checked':''}" onclick="toggleDone('${d.id}')"></div>
<div class="day-body">
 <div class="day-meta">
  <span class="day-date">${d.day} · ${d.date}</span>
  <span class="phase-chip" style="background:${phase.color}">${phase.label}</span>
 </div>
 <div class="day-task">${d.task}</div>
 <button class="day-expand" onclick="toggleExpand('${d.id}')">
  <svg class="arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
  detalhes
 </button>
 <div class="day-detail">
  ${d.recursos&&d.recursos!=='—'?`<div class="detail-row"><div class="detail-label">recursos</div><div class="detail-value">${linkifyText(d.recursos)}</div></div>`:''}
  ${d.exercicios&&d.exercicios!=='—'?`<div class="detail-row"><div class="detail-label">exercícios</div><div class="detail-value">${d.exercicios}</div></div>`:''}
  ${d.milestone?`<div class="detail-row"><div class="detail-label">milestone</div><div class="detail-value"><em>${d.milestone}</em></div></div>`:''}
  ${d.obs?`<div class="detail-row"><div class="detail-label">nota</div><div class="detail-value">${d.obs}</div></div>`:''}
  <div class="detail-row" style="margin-top:8px;">
   <div class="detail-label">minha nota</div>
   <div class="detail-value">
    <textarea class="note-input" data-id="${d.id}" placeholder="anotações + cole URLs" oninput="saveNote('${d.id}',this.value)">${escapeHtml(note)}</textarea>
    <div class="note-links" id="links-${d.id}">${renderNoteLinks(note)}</div>
   </div>
  </div>
 </div>
</div></div>`}

function renderWeeks(){const list=document.getElementById('weekList');const cw=findCurrentWeek();const t=todayISO();let html='';
for(const w of DATA){const vis=w.days.filter(shouldShowDay);if(!vis.length&&currentFilter!=='all')continue;const total=w.days.length;const done=w.days.filter(d=>state.done[d.id]).length;const isCurrent=w.week===cw.week;const shouldOpen=isCurrent||(currentFilter!=='all'&&vis.length>0);
html+=`<div class="week ${isCurrent?'is-current':''} ${shouldOpen?'is-open':''}" data-week="${w.week}">
<div class="week-header" onclick="toggleWeek('${w.week}')">
 <div class="week-id">${w.week}</div>
 <div class="week-info"><div class="week-focus">${w.focus}</div><div class="week-period">${w.period}</div></div>
 <div class="week-progress">
  <div class="week-count ${done===total?'complete':''}">${done}/${total}</div>
  <svg class="week-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
 </div>
</div>
<div class="week-days">${vis.map(d=>renderDay(d,t)).join('')}</div></div>`}
if(!html)html='<div class="empty">Nada por aqui — tente outro filtro.</div>';list.innerHTML=html}

function toggleDone(id){state.done[id]=!state.done[id];saveState();renderProgress();const el=document.querySelector(`[data-id="${id}"]`);if(el){el.classList.toggle('is-done',!!state.done[id]);el.querySelector('.check').classList.toggle('is-checked',!!state.done[id])}const wEl=el?.closest('.week');if(wEl){const wId=wEl.dataset.week;const w=DATA.find(x=>x.week===wId);if(w){const d=w.days.filter(x=>state.done[x.id]).length;const c=wEl.querySelector('.week-count');c.textContent=`${d}/${w.days.length}`;c.classList.toggle('complete',d===w.days.length)}}}
function toggleWeek(id){document.querySelector(`[data-week="${id}"]`)?.classList.toggle('is-open')}
function toggleExpand(id){document.querySelector(`[data-id="${id}"]`)?.classList.toggle('is-expanded')}
function saveNote(id,v){if(v&&v.trim())state.notes[id]=v;else delete state.notes[id];const el=document.getElementById(`links-${id}`);if(el)el.innerHTML=renderNoteLinks(v);saveState()}

function setFilter(f){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));renderWeeks()}
function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=state.theme;updateThemeIcon();saveState()}
function updateThemeIcon(){const d=state.theme==='dark';document.getElementById('themeIcon').innerHTML=d?'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>':'<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>'}
function resetAll(){if(!confirm('Apagar todas as marcações e notas?'))return;state.done={};state.notes={};saveState();renderProgress();renderWeeks()}

function init(){loadState();document.documentElement.dataset.theme=state.theme;updateThemeIcon();renderCountdown();renderProgress();renderToday();renderWeeks();
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>setFilter(b.dataset.filter)));
document.getElementById('themeBtn').addEventListener('click',toggleTheme);
document.getElementById('resetBtn').addEventListener('click',resetAll);
setInterval(renderCountdown,60000)}
init();
if('serviceWorker' in navigator&&location.protocol.startsWith('http'))window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
</script>
